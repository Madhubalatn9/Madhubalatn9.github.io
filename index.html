<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovate with Madhu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 60px 0; }
        .product-card { border: none; transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .affiliate-disclaimer { font-size: 0.8rem; color: #6c757d; }
    </style>
</head>
<body>

<section class="hero text-center">
    <div class="container">
        <h1>Innovate with Madhu</h1>
        <p class="lead">CSE Student | AI Researcher | Tech Curator</p>
    </div>
</section>

<div class="container my-5">
    <h2 class="text-center mb-4">My Essential Coding Gear</h2>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card product-card h-100 shadow-sm">
                <div class="card-body text-center">
                    <h5 class="card-title">Ergonomic Laptop Stand</h5>
                    <p class="card-text text-muted">Better posture for long coding sessions.</p>
                    <a href="https://amzn.to/3NqrO2o" class="btn btn-primary">View on Amazon</a>
                </div>
            </div>
        </div>
        </div>

    <footer class="mt-5 pt-4 border-top text-center">
        <p class="affiliate-disclaimer">
            As an Amazon Associate, I earn from qualifying purchases. #Ad
        </p>
    </footer>
</div>

</body>
</html>
